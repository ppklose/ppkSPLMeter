name: Build Windows Standalone

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.7

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-Windows-Standalone
          path: build/SPLMeter_artefacts/Release/Standalone/SPLMeter.exe
