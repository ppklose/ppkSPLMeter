name: SPLMeter build chain

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # macOS — Standalone, VST3, AU
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (Standalone · VST3 · AU)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.7-macos

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-macOS-Standalone
          path: build/SPLMeter_artefacts/Release/Standalone/SPLMeter.app

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-macOS-VST3
          path: build/SPLMeter_artefacts/Release/VST3/SPLMeter.vst3

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-macOS-AU
          path: build/SPLMeter_artefacts/Release/AU/SPLMeter.component

  # ---------------------------------------------------------------------------
  # Windows — Standalone, VST3 (with ASIO)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (Standalone · VST3 · ASIO)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE + ASIO SDK
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.7-asio-2.3.3-windows

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Sign Windows binaries (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret:          ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint:                     ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name:     ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder:                 build/SPLMeter_artefacts/Release
          files-folder-filter:          exe,dll,vst3
          files-folder-recursive:       true
          file-digest:                  SHA256
          timestamp-rfc3161:            http://timestamp.acs.microsoft.com
          timestamp-digest:             SHA256

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-Windows-Standalone
          path: build/SPLMeter_artefacts/Release/Standalone/SPLMeter.exe

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-Windows-VST3
          path: build/SPLMeter_artefacts/Release/VST3/SPLMeter.vst3
