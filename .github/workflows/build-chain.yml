name: SPLMeter build chain

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # macOS — Standalone, VST3, AU
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (Standalone · VST3 · AU)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.7-macos

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE:     ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD:    ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$MACOS_KEYCHAIN_PWD" build.keychain
          rm /tmp/certificate.p12

      - name: Sign macOS binaries
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          ENTITLEMENTS="Source/entitlements.plist"
          APP="build/SPLMeter_artefacts/Release/Standalone/SPLMeter.app"
          VST="build/SPLMeter_artefacts/Release/VST3/SPLMeter.vst3"
          AU="build/SPLMeter_artefacts/Release/AU/SPLMeter.component"

          # Sign inner frameworks/dylibs first, then the bundle
          find "$APP" -name "*.dylib" -o -name "*.framework" | while read f; do
            codesign --force --options runtime \
              --sign "$MACOS_SIGNING_IDENTITY" "$f"
          done
          codesign --force --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$MACOS_SIGNING_IDENTITY" "$APP"

          # Plugins: no microphone entitlement needed (host provides it)
          codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" "$VST"
          codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" "$AU"

          # Verify
          codesign --verify --deep --strict "$APP"
          codesign --verify --deep --strict "$VST"
          codesign --verify --deep --strict "$AU"

      - name: Notarize and staple
        env:
          NOTARIZATION_KEY_ID:     ${{ secrets.NOTARIZATION_KEY_ID }}
          NOTARIZATION_KEY_ISSUER: ${{ secrets.NOTARIZATION_KEY_ISSUER }}
          NOTARIZATION_KEY_P8:     ${{ secrets.NOTARIZATION_KEY_P8 }}
        run: |
          echo "$NOTARIZATION_KEY_P8" | base64 --decode > /tmp/notarization_key.p8

          APP="build/SPLMeter_artefacts/Release/Standalone/SPLMeter.app"
          VST="build/SPLMeter_artefacts/Release/VST3/SPLMeter.vst3"
          AU="build/SPLMeter_artefacts/Release/AU/SPLMeter.component"

          notarize_and_staple() {
            local target="$1"
            local name="$(basename "$target")"
            ditto -c -k --keepParent "$target" "/tmp/${name}.zip"
            xcrun notarytool submit "/tmp/${name}.zip" \
              --key /tmp/notarization_key.p8 \
              --key-id "$NOTARIZATION_KEY_ID" \
              --issuer "$NOTARIZATION_KEY_ISSUER" \
              --wait
            xcrun stapler staple "$target"
            rm "/tmp/${name}.zip"
          }

          notarize_and_staple "$APP"
          notarize_and_staple "$VST"
          notarize_and_staple "$AU"

          rm /tmp/notarization_key.p8

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-macOS-Standalone
          path: build/SPLMeter_artefacts/Release/Standalone/SPLMeter.app

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-macOS-VST3
          path: build/SPLMeter_artefacts/Release/VST3/SPLMeter.vst3

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-macOS-AU
          path: build/SPLMeter_artefacts/Release/AU/SPLMeter.component

  # ---------------------------------------------------------------------------
  # Windows — Standalone, VST3 (with ASIO)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (Standalone · VST3 · ASIO)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE + ASIO SDK
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.7-asio-2.3.3-windows

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Sign Windows binaries (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret:          ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint:                     ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name:     ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder:                 build/SPLMeter_artefacts/Release
          files-folder-filter:          exe,dll,vst3
          files-folder-recurse:         true
          file-digest:                  SHA256
          timestamp-rfc3161:            http://timestamp.acs.microsoft.com
          timestamp-digest:             SHA256

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-Windows-Standalone
          path: build/SPLMeter_artefacts/Release/Standalone/SPLMeter.exe

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-Windows-VST3
          path: build/SPLMeter_artefacts/Release/VST3/SPLMeter.vst3

  # ---------------------------------------------------------------------------
  # Linux — Standalone, VST3
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux (Standalone · VST3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxext-dev \
            libgl1-mesa-dev \
            libfreetype-dev libfontconfig1-dev \
            libgtk-3-dev

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.7-linux

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-Linux-Standalone
          path: build/SPLMeter_artefacts/Release/Standalone/SPLMeter

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SPLMeter-Linux-VST3
          path: build/SPLMeter_artefacts/Release/VST3/SPLMeter.vst3
